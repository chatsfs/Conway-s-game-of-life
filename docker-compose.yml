version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
    volumes:
      - backend-storage:/rails/storage
      - backend-db:/rails/db
    networks:
      - conway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/games"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:80
    depends_on:
      - backend
    networks:
      - conway-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  conway-network:
    driver: bridge

volumes:
  backend-storage:
  backend-db:
